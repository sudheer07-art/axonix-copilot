<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AXONIX | Sign Up</title>

    <link rel="stylesheet" href="css/signup.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="signup-container">

    <!-- LEFT PANEL -->

    <div class="left-side">

        <div class="logo">

            🚀 AXONIX

        </div>

        <h1>

            Create Account

        </h1>

        <!-- <p>

            Join AXONIX and unlock AI-powered career tools.

        </p> -->

        <form id="signupForm">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

            </div>

            <button
                type="submit"
                class="signup-btn">

                Create Account

            </button>

            <p id="signupMessage"></p>

        </form>

    </div>

                Already have an account?

            </button>

        </div>

    </div>

</div>

<script src="js/signup.js"></script>


</body>

</html>
