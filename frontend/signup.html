<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>AXONIX Signup</title>

    <link rel="stylesheet"
        href="css/signup.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="signup-wrapper">

    <div class="signup-card">

        <!-- Logo -->

        <div class="logo">

            <div class="logo-icon">

                <i class="fa-solid fa-rocket"></i>

            </div>

            <span>AXONIX</span>

        </div>

        <!-- Heading -->

        <div class="heading">

            <h1>

                Create Account 🚀

            </h1>

            <p>

                Start your AI-powered career journey today.

            </p>

        </div>

        <!-- Signup Form -->

        <form id="signupForm">

            <!-- Username -->

            <div class="input-group">

                <label>Full Name</label>

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        id="username"
                        type="text"
                        placeholder="Enter your name"
                        required>

                </div>

            </div>

            <!-- Email -->

            <div class="input-group">

                <label>Email</label>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        id="email"
                        type="email"
                        placeholder="Enter your email"
                        required>

                </div>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>Password</label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        id="password"
                        type="password"
                        placeholder="Create password"
                        required>

                    <button
                        type="button"
                        class="eye-btn"
                        id="togglePassword">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

            </div>

            <!-- Confirm Password -->

            <div class="input-group">

                <label>Confirm Password</label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        id="confirmPassword"
                        type="password"
                        placeholder="Confirm password"
                        required>

                    <button
                        type="button"
                        class="eye-btn"
                        id="toggleConfirmPassword">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

            </div>

            <!-- Message -->

            <div
                id="signupMessage"
                class="message">

            </div>

            <!-- Button -->

            <button
                class="signup-btn"
                type="submit">

                <span>Create Account</span>

            </button>

        </form>

        <!-- Divider -->

        <div class="divider">

            <span>OR</span>

        </div>

        <!-- Google Button -->

        <button class="google-btn">

            <i class="fa-brands fa-google"></i>

            Continue with Google

        </button>

        <!-- Bottom -->

        <div class="bottom-text">

            Already have an account?

            <a href="#"
               onclick="window.parent.openLogin();return false;">

                Login

            </a>

        </div>

    </div>

</div>

<script src="js/signup.js"></script>

</body>

</html>
