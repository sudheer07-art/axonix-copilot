<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup | AXONIX</title>

<link rel="stylesheet" href="css/signup.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="signup-page">

<div class="glass-card">

<div class="left-side">

<div class="logo">

<i class="fa-solid fa-rocket"></i>

<span>AXONIX</span>

</div>

<h1>

Start Your Career Journey 🚀

</h1>

<p>

Create your account and unlock AI-powered resume analysis, ATS optimization, live job search and career insights.

</p>

<div class="feature">

<i class="fa-solid fa-file-arrow-up"></i>

<span>Upload Resume</span>

</div>

<div class="feature">

<i class="fa-solid fa-robot"></i>

<span>Gemini AI Review</span>

</div>

<div class="feature">

<i class="fa-solid fa-chart-column"></i>

<span>Career Analytics</span>

</div>

<div class="feature">

<i class="fa-solid fa-briefcase"></i>

<span>Live Jobs</span>

</div>

</div>

<div class="right-side">

<h2>

Create Account

</h2>

<form id="signupForm">

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="username"
placeholder="Full Name"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="button"
class="eye-btn"
id="togglePassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button
type="button"
class="eye-btn"
id="toggleConfirmPassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

<button
type="submit"
class="signup-btn">

Create Account

</button>

</form>

<p class="bottom-text">

Already have an account?

<a href="#" onclick="window.parent.openLogin();return false;">

Login

</a>

</p>

</div>

</div>

</div>

<script src="js/signup.js"></script>

</body>

</html>
