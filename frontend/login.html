<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AXONIX | Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="login-container">

    <!-- LEFT SIDE -->

    <div class="left-side">

        <!-- <div class="logo">

            🚀 AXONIX

        </div> -->

        <h1>

            Welcome Back

        </h1>

        <p>

            Login to continue your AI Career Journey.

        </p>

        <form id="loginForm">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Username"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

            </div>

            <button
                type="submit"
                class="login-btn">

                Login

            </button>

            <p id="loginMessage"></p>
 <button
                class="signup-btn"
                onclick="window.location='signup.html'">

                Create Account

            </button>
        </form>
       

    </div>  

            <!-- <button
                class="signup-btn"
                onclick="window.location='signup.html'">

                Create Account

            </button> -->

        <!-- </div>

    </div> -->

</div>

<script src="js/login.js"></script>

</body>

</html>
