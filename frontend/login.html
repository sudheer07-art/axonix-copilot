<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>AXONIX Login</title>

    <link rel="stylesheet"
        href="css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <!-- Logo -->

        <div class="logo">

            <div class="logo-icon">

                <i class="fa-solid fa-rocket"></i>

            </div>

            <span>AXONIX</span>

        </div>

        <!-- Heading -->

        <div class="heading">

            <h1>

                Welcome Back 👋

            </h1>

            <p>

                Sign in to continue your AI career journey.

            </p>

        </div>

        <!-- Login Form -->

        <form id="loginForm">

            <!-- Email -->

            <div class="input-group">

                <label>

                    Email

                </label>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input

                        id="email"

                        type="email"

                        placeholder="Enter your email"

                        required

                    >

                </div>

            </div>

            <!-- Password -->

            <div class="input-group">

                <label>

                    Password

                </label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input

                        id="password"

                        type="password"

                        placeholder="Enter password"

                        required

                    >

                    <button

                        type="button"

                        id="togglePassword"

                        class="eye-btn">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

            </div>

            <!-- Remember -->

            <div class="remember-row">

                <label>

                    <input
                        type="checkbox">

                    Remember me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <!-- Message -->

            <div
                id="loginMessage"
                class="message">

            </div>

            <!-- Login Button -->

            <button
                class="login-btn"
                type="submit">

                <span>

                    Login

                </span>

            </button>

        </form>

        <!-- Divider -->

        <div class="divider">

            <span>

                OR

            </span>

        </div>

        <!-- Social -->

        <button class="google-btn">

            <i class="fa-brands fa-google"></i>

            Continue with Google

        </button>

        <!-- Bottom -->

        <div class="bottom-text">

            Don't have an account?

            <a href="#"

               onclick="window.parent.openSignup();return false;">

                Create Account

            </a>

        </div>

    </div>

</div>

<script src="js/login.js"></script>


</body>

</html>
